<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0B7285">
<title>Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,700;125,800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#0B7285; --accent-soft:#E6F3F5; --ink:#1A2421; --fog:#F2F4F3; --line:#DDE3E1; --muted:#6E7A76; --flag:#C92A2A; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--fog);color:var(--ink);font:400 15px/1.55 'Inter',system-ui,sans-serif;display:flex;flex-direction:column}
  button{cursor:pointer;font-family:inherit}
  input:focus{outline:2px solid var(--accent);outline-offset:-1px}

  header{background:#fff;border-bottom:3px solid var(--accent);padding:12px 16px}
  .hrow{display:flex;justify-content:space-between;align-items:center;max-width:760px;margin:0 auto}
  .eyebrow{font:600 10.5px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  h1{font:800 24px/1 'Archivo',sans-serif;font-stretch:125%;text-transform:uppercase}
  .toggle{display:flex;gap:6px}
  .toggle button{border:1.5px solid var(--line);background:#fff;color:var(--muted);padding:6px 12px;font:600 12px 'IBM Plex Mono',monospace}
  .toggle button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

  .band{max-width:760px;margin:0 auto;width:100%;padding:12px 16px 0}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:6px}
  .stat{background:#fff;border:1px solid var(--line);padding:10px 12px;min-width:0}
  .stat .v{font:600 17px 'IBM Plex Mono',monospace;white-space:nowrap}
  .stat .v small{font-size:11px;color:var(--muted)}
  .stat .l{font-size:10.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
  .fresh{font:500 10.5px 'IBM Plex Mono',monospace;color:var(--muted);padding:6px 2px 0}
  .brief{background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent);padding:12px 14px;margin-bottom:10px;font-size:14px;line-height:1.6;color:var(--ink)}
  .brief.loading{color:var(--muted);font:500 12px 'IBM Plex Mono',monospace}
  .brief .lbl{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:5px}

  #chat{flex:1;overflow-y:auto;padding:14px 16px;max-width:760px;margin:0 auto;width:100%}
  .msg{max-width:85%;padding:10px 14px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;margin-bottom:10px;border:1px solid var(--line);background:#fff}
  .msg.user{margin-left:auto;background:var(--accent);color:#fff;border:none}
  .starters{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .starters button{border:1px solid var(--line);background:#fff;padding:8px 12px;font-size:13px}
  .thinking{font:500 12px 'IBM Plex Mono',monospace;color:var(--muted)}
  .err{background:#FDECEC;border:1px solid var(--flag);padding:12px;font-size:13px;margin-bottom:10px}

  .inputbar{background:#fff;border-top:1px solid var(--line);padding:10px 16px calc(10px + env(safe-area-inset-bottom))}
  .irow{display:flex;gap:8px;max-width:760px;margin:0 auto}
  .irow input{flex:1;border:1.5px solid var(--line);padding:11px 13px;font-size:16px;background:#F9FAFA}
  .irow button{background:var(--accent);color:#fff;border:none;padding:0 18px;font:600 13px 'IBM Plex Mono',monospace}
  .irow button:disabled{background:#B9C2BF}

  /* PIN screen */
  #pinScreen{position:fixed;inset:0;background:var(--fog);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:24px;z-index:10}
  #pinScreen .card{background:#fff;border:1px solid var(--line);border-top:4px solid var(--accent);padding:28px;max-width:340px;width:100%;text-align:center}
  #pinScreen input{width:100%;border:1.5px solid var(--line);padding:12px;font:600 22px 'IBM Plex Mono',monospace;text-align:center;letter-spacing:.3em;margin:14px 0}
  #pinScreen button{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;font:600 14px 'IBM Plex Mono',monospace}
  .hidden{display:none !important}
</style>
</head>
<body>

<div id="pinScreen">
  <div class="card">
    <div class="eyebrow">Household Coach</div>
    <h1 style="font-size:20px;margin-top:6px">Enter PIN</h1>
    <input id="pinInput" inputmode="numeric" autocomplete="off" placeholder="••••">
    <div id="pinErr" style="color:var(--flag);font-size:13px;margin-bottom:10px" class="hidden">Wrong PIN, try again.</div>
    <button onclick="submitPin()">Open</button>
  </div>
</div>

<header>
  <div class="hrow">
    <div>
      <div class="eyebrow">Coach</div>
      <h1 id="who">Jess</h1>
    </div>
    <div class="toggle">
      <button id="btn-jess" class="on" onclick="setPerson('jess')">Jess</button>
      <button id="btn-billy" onclick="setPerson('billy')">Billy</button>
    </div>
  </div>
</header>

<div class="band">
  <div id="briefing" class="brief hidden"></div>
  <div id="dataErr" class="err hidden"></div>
  <div id="stats" class="stats"></div>
  <div id="fresh" class="fresh"></div>
</div>

<div id="chat"></div>

<div class="inputbar">
  <div class="irow">
    <input id="msgInput" placeholder="Message the coach…" onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>
const CHAT_URL = "https://hynmejsyharalkmvtghk.supabase.co/functions/v1/coach-chat";
const APP_BUILD = "2026-07-23a";
const ACCENTS = { jess: ["#0B7285", "#E6F3F5"], billy: ["#D9480F", "#FCEEE6"] };
const STARTERS = {
  jess: ["How was my week?", "Am I eating enough protein?", "Build me an upper-body day"],
  billy: ["How's my fueling vs training?", "What's on the plan this week?", "How was my week?"],
};

let person = "jess";
let pin = "";
let history = { jess: [], billy: [] };
let busy = false;

// Remember PIN on this device where storage is available; degrade silently otherwise
try { pin = localStorage.getItem("coach_pin") || ""; } catch (e) {}
if (pin) document.getElementById("pinScreen").classList.add("hidden");

function submitPin() {
  const v = document.getElementById("pinInput").value.trim();
  if (!v) return;
  pin = v;
  try { localStorage.setItem("coach_pin", v); } catch (e) {}
  document.getElementById("pinScreen").classList.add("hidden");
  loadData();
}

function setPerson(p) {
  person = p;
  const [acc, soft] = ACCENTS[p];
  document.documentElement.style.setProperty("--accent", acc);
  document.documentElement.style.setProperty("--accent-soft", soft);
  document.getElementById("who").textContent = p === "jess" ? "Jess" : "Billy";
  document.getElementById("btn-jess").classList.toggle("on", p === "jess");
  document.getElementById("btn-billy").classList.toggle("on", p === "billy");
  renderChat();
  loadData();
}

const fmt = (v, d = 0) => v == null ? "—" : Number(v).toLocaleString(undefined, { maximumFractionDigits: d });

async function loadData() {
  const errEl = document.getElementById("dataErr");
  errEl.classList.add("hidden");
  if (!pin) return;
  try {
    const r = await fetch(CHAT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-coach-pin": pin },
      body: JSON.stringify({ person, action: "stats" }),
    });
    if (r.status === 401) {
      try { localStorage.removeItem("coach_pin"); } catch (e) {}
      pin = "";
      document.getElementById("pinScreen").classList.remove("hidden");
      document.getElementById("pinErr").classList.remove("hidden");
      return;
    }
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const a = d.avg7 || {};
    const cells = [
      ["7d avg kcal in", fmt(a.calories_in), ""],
      ["7d avg protein", fmt(a.protein_g), "g"],
      ["7d avg active", fmt(a.active_kcal), "kcal"],
      ["7d avg steps", fmt(a.steps), ""],
    ];
    if (a.sleep_hours != null) cells.push(["7d avg sleep", fmt(a.sleep_hours, 1), "h"]);
    if (a.hrv_ms != null) cells.push(["7d avg HRV", fmt(a.hrv_ms), "ms"]);
    document.getElementById("stats").innerHTML = cells.map(([l, v, u]) => `<div class="stat"><div class="v">${v}<small> ${u}</small></div><div class="l">${l}</div></div>`).join("");
    document.getElementById("fresh").textContent = (d.latest_date ? `latest data: ${d.latest_date} \u00b7 decisions run on weekly trends, not single days` : "no data yet for this athlete") + ` \u00b7 v${APP_BUILD}`;
    loadBriefing();
  } catch (e) {
    errEl.textContent = "Couldn't load tracking data (" + e.message + "). Chat still works.";
    errEl.classList.remove("hidden");
  }
}

async function loadBriefing() {
  const el = document.getElementById("briefing");
  el.className = "brief loading";
  el.textContent = "reading your week\u2026";
  try {
    const r = await fetch(CHAT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-coach-pin": pin },
      body: JSON.stringify({ person, action: "briefing" }),
    });
    if (!r.ok) { el.className = "brief hidden"; return; }
    const d = await r.json();
    if (d.text) {
      el.className = "brief";
      el.innerHTML = `<span class="lbl">Today's read \u00b7 ${person === "jess" ? "Jess" : "Billy"}</span>` + d.text.replace(/</g, "&lt;");
    } else {
      el.className = "brief hidden";
    }
  } catch (e) {
    el.className = "brief hidden";
  }
}

function renderChat() {
  const el = document.getElementById("chat");
  const msgs = history[person];
  if (!msgs.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:14px;padding-top:8px">Ask about your week, your plan, or what to adjust.</div>
      <div class="starters">${STARTERS[person].map(s => `<button onclick="document.getElementById('msgInput').value='${s}'">${s}</button>`).join("")}</div>`;
    return;
  }
  el.innerHTML = msgs.map(m => `<div class="msg ${m.role === "user" ? "user" : ""}">${m.content.replace(/</g, "&lt;")}</div>`).join("") + (busy ? `<div class="thinking">coach is thinking…</div>` : "");
  el.scrollTop = el.scrollHeight;
}

async function send() {
  const inp = document.getElementById("msgInput");
  const text = inp.value.trim();
  if (!text || busy) return;
  history[person].push({ role: "user", content: text });
  inp.value = ""; busy = true;
  document.getElementById("sendBtn").disabled = true;
  renderChat();
  try {
    const r = await fetch(CHAT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-coach-pin": pin },
      body: JSON.stringify({ person, messages: history[person] }),
    });
    const data = await r.json();
    if (r.status === 401) {
      try { localStorage.removeItem("coach_pin"); } catch (e) {}
      document.getElementById("pinScreen").classList.remove("hidden");
      document.getElementById("pinErr").classList.remove("hidden");
      history[person].pop();
    } else if (!r.ok) {
      history[person].push({ role: "assistant", content: "Problem: " + (data.error || "unknown") });
    } else {
      history[person].push({ role: "assistant", content: data.reply });
    }
  } catch (e) {
    history[person].push({ role: "assistant", content: "Connection problem: " + e.message + ". Try again." });
  } finally {
    busy = false;
    document.getElementById("sendBtn").disabled = false;
    renderChat();
  }
}

if (pin) loadData();
renderChat();

// Keep the installed home-screen app self-updating via a network-first service worker.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (reloaded) return;
    reloaded = true;
    location.reload();
  });
}
console.log("coach build", APP_BUILD);
</script>
</body>
</html>
